<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#08111F">
<title>Admin · Mundial 2026 · LPS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --dark:#08111F;--d2:#0D1828;--d3:#122030;
  --gold:#E8C542;--cel:#6CACE4;--cel2:#9ECAF0;
  --text:#DDE5F3;--muted:#7A8EAD;--white:#FFF;
  --green:#2ECC71;--red:#E74C3C;--admin:#E84848;
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Barlow Condensed',sans-serif;overflow:hidden;}
body{display:flex;flex-direction:column;}
input,button,select{font-family:'Barlow Condensed',sans-serif;}

/* LOGIN */
.login-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#050C18,#0A1525);}
.login-card{background:var(--d3);border:1.5px solid rgba(232,72,72,.3);border-radius:16px;padding:28px 22px;width:100%;max-width:340px;text-align:center;}
.login-icon{font-size:40px;margin-bottom:10px;}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--white);letter-spacing:2px;margin-bottom:2px;}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;}
.form-group{margin-bottom:12px;text-align:left;}
.form-label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px;}
.form-input{width:100%;background:rgba(0,0,0,.3);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:11px 13px;color:var(--white);font-size:14px;font-weight:600;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--admin);}
.btn-login{width:100%;background:var(--admin);color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;margin-top:6px;}
.btn-login:disabled{opacity:.5;}
.login-error{background:rgba(232,72,72,.15);border:1px solid rgba(232,72,72,.3);border-radius:6px;padding:7px 10px;font-size:11px;color:var(--admin);margin-top:8px;display:none;}

/* ADMIN */
.admin-screen{display:none;flex-direction:column;height:100vh;}
.adm-hdr{height:52px;background:linear-gradient(135deg,#160808,#200E0E);border-bottom:2px solid var(--admin);display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;}
.adm-badge{background:var(--admin);color:#fff;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:800;letter-spacing:1.5px;}
.adm-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white);margin-left:8px;letter-spacing:1px;}
.adm-title span{color:var(--admin);}
.adm-email{font-size:9px;color:var(--muted);}
.btn-logout{background:rgba(232,72,72,.15);border:1px solid rgba(232,72,72,.3);color:var(--admin);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}

/* FILTERS */
.filter-bar{background:var(--d2);border-bottom:1px solid rgba(255,255,255,.05);padding:7px 10px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;}
.filter-bar::-webkit-scrollbar{height:0;}
.fbtn{flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);border-radius:20px;padding:5px 11px;font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;white-space:nowrap;}
.fbtn.active{background:var(--gold);border-color:var(--gold);color:#000;}

/* STATS */
.stats-bar{background:var(--d3);border-bottom:1px solid rgba(255,255,255,.05);padding:7px 14px;display:flex;gap:16px;align-items:center;flex-shrink:0;}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);line-height:1;display:block;}
.stat-l{font-size:7px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;display:block;}
.stat-g .stat-n{color:var(--green);}
.stat-r .stat-n{color:var(--admin);}

/* MATCH LIST */
.match-list{flex:1;overflow-y:auto;padding:8px 10px;}

/* DATE GROUP */
.dg-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);display:flex;align-items:center;gap:6px;margin-bottom:5px;margin-top:10px;}
.dg-label:first-child{margin-top:0;}
.dg-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(232,197,66,.25),transparent);}

/* MATCH CARD */
.mc{background:var(--d3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;margin-bottom:6px;position:relative;overflow:hidden;}
.mc.arg{border-color:rgba(108,172,228,.3);background:linear-gradient(135deg,#0C1E35,#12273F);}
.mc.played{border-color:rgba(46,204,113,.2);}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.mc.arg::before{background:linear-gradient(90deg,var(--cel),transparent);}
.mc.played::before{background:linear-gradient(90deg,var(--green),transparent);}

.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.mc-hora{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.mc-hora.arg{color:var(--cel2);}
.mc-badges{display:flex;gap:4px;}
.badge{font-size:7px;font-weight:700;letter-spacing:.8px;padding:2px 5px;border-radius:3px;}
.badge-g{background:rgba(255,255,255,.07);color:var(--muted);}
.badge-a{background:rgba(108,172,228,.15);color:var(--cel);}
.badge-f{background:rgba(46,204,113,.15);color:var(--green);}
.mc-sede{font-size:8px;color:var(--muted);}

/* SCORE ROW */
.mc-body{display:flex;align-items:center;gap:6px;}
.mc-team{flex:1;}
.mc-flag{font-size:14px;display:block;line-height:1;margin-bottom:1px;}
.mc-name{font-size:13px;font-weight:800;color:var(--text);display:block;line-height:1.2;}
.mc-name.arg{color:var(--cel2);}
.mc-team.right{text-align:right;}
.mc-scores{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.si{width:40px;height:40px;background:rgba(0,0,0,.35);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:22px;text-align:center;outline:none;transition:border-color .2s;}
.si:focus{border-color:var(--gold);}
.si.filled{background:rgba(232,197,66,.08);border-color:rgba(232,197,66,.4);}
.si-sep{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);}

/* ACTIONS */
.mc-actions{display:flex;gap:6px;margin-top:8px;}
.btn-save{flex:1;background:var(--gold);color:#000;border:none;border-radius:7px;padding:9px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-save:disabled{opacity:.5;cursor:default;}
.btn-save.saving{background:orange;color:#fff;}
.btn-save.ok{background:var(--green);color:#fff;}
.btn-save.err{background:var(--red);color:#fff;}
.btn-del{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.25);color:var(--red);border-radius:7px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-del:disabled{opacity:.4;}

/* TOAST */
.toast{position:fixed;top:60px;left:10px;right:10px;background:var(--d3);border-radius:10px;padding:12px 14px;font-size:12px;font-weight:600;color:var(--text);z-index:9999;transform:translateY(-90px);opacity:0;transition:all .3s;border-left:3px solid var(--green);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.err{border-left-color:var(--red);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;font-size:12px;color:var(--muted);}
.spinner{width:24px;height:24px;border:2px solid rgba(232,197,66,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{html,body{background:var(--dark)!important;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">PANEL ADMIN</div>
    <div class="login-sub">Mundial 2026 · LPS Seguridad</div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" id="login-btn" onclick="login()">INGRESAR</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="admin-screen">

  <div class="adm-hdr">
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="adm-badge">ADMIN</span>
      <div>
        <span class="adm-title">MUNDIAL <span>2026</span></span>
        <div class="adm-email" id="adm-email"></div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>

  <div class="filter-bar">
    <button class="fbtn active" onclick="setFilter('hoy',this)">⚡ Hoy</button>
    <button class="fbtn" onclick="setFilter('argentina',this)">⭐ Argentina</button>
    <button class="fbtn" onclick="setFilter('pendiente',this)">⏳ Sin jugar</button>
    <button class="fbtn" onclick="setFilter('grupos',this)">⚽ Grupos</button>
    <button class="fbtn" onclick="setFilter('16avos',this)">16avos</button>
    <button class="fbtn" onclick="setFilter('octavos',this)">Octavos</button>
    <button class="fbtn" onclick="setFilter('cuartos',this)">Cuartos</button>
    <button class="fbtn" onclick="setFilter('semifinal',this)">Semis</button>
    <button class="fbtn" onclick="setFilter('final',this)">🏆 Final</button>
    <button class="fbtn" onclick="setFilter('todos',this)">Todos</button>
  </div>

  <div class="stats-bar">
    <div class="stat-g"><span class="stat-n" id="s-j">0</span><span class="stat-l">Jugados</span></div>
    <div class="stat-r"><span class="stat-n" id="s-r">0</span><span class="stat-l">Restantes</span></div>
    <div><span class="stat-n" id="s-h">0</span><span class="stat-l">Hoy</span></div>
    <button onclick="loadMatches()" style="margin-left:auto;background:rgba(108,172,228,.1);border:1px solid rgba(108,172,228,.2);color:var(--cel);border-radius:6px;padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer;">🔄 Actualizar</button>
  </div>

  <div class="match-list" id="match-list">
    <div class="spinner"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://gesujigrxpqvyuquitmz.supabase.co';
const SB_KEY = 'sb_publishable_jEvLMS6TZnRFgyAtEaY7JQ_Va8XpgYk';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

let matches = [];
let filter = 'hoy';
let today = '';

function getToday() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dt = new Date(+y, +m-1, +day);
  return `${days[dt.getDay()]} ${+day} de ${months[+m-1]}`;
}

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type==='err'?' err':'');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── AUTH ──
async function checkAuth() {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) showAdmin(session.user.email);
  sb.auth.onAuthStateChange((e, s) => {
    if (e === 'SIGNED_IN') showAdmin(s.user.email);
    if (e === 'SIGNED_OUT') showLogin();
  });
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');
  if (!email || !pass) { err.textContent='Completá email y contraseña'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='INGRESANDO...'; err.style.display='none';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    err.textContent = '❌ Email o contraseña incorrectos';
    err.style.display = 'block';
    btn.disabled=false; btn.textContent='INGRESAR';
  }
}

async function logout() {
  await sb.auth.signOut();
}

function showLogin() {
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').textContent='INGRESAR';
}

function showAdmin(email) {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').style.display='flex';
  document.getElementById('adm-email').textContent=email;
  today = getToday();
  loadMatches();
}

// ── DATA ──
async function loadMatches() {
  document.getElementById('match-list').innerHTML = '<div class="spinner"></div>';
  const { data, error } = await sb.from('mundial_partidos').select('*').order('id');
  if (error) { toast('Error cargando: '+error.message,'err'); return; }
  matches = data || [];
  updateStats();
  render();
}

function updateStats() {
  const j = matches.filter(m => m.goles1!==null && m.goles2!==null).length;
  const h = matches.filter(m => m.fecha===today).length;
  document.getElementById('s-j').textContent = j;
  document.getElementById('s-r').textContent = matches.length - j;
  document.getElementById('s-h').textContent = h;
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFiltered() {
  switch(filter) {
    case 'hoy':       return matches.filter(m => m.fecha===today);
    case 'argentina': return matches.filter(m => m.es_argentina);
    case 'pendiente': return matches.filter(m => m.goles1===null && m.goles2===null);
    case 'todos':     return matches;
    default:          return matches.filter(m => m.fase===filter);
  }
}

// ── RENDER ──
function render() {
  const list = document.getElementById('match-list');
  const filtered = getFiltered();
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">📋 No hay partidos en este filtro</div>';
    return;
  }
  // Group by date
  const byDate = {};
  filtered.forEach(m => { if(!byDate[m.fecha]) byDate[m.fecha]=[]; byDate[m.fecha].push(m); });
  list.innerHTML = '';
  Object.keys(byDate).sort().forEach(fecha => {
    const dg = document.createElement('div');
    const isToday = fecha===today;
    dg.innerHTML = `<div class="dg-label">${isToday?'⚡ HOY · ':''}${fmtDate(fecha)}</div>`;
    byDate[fecha].forEach(m => dg.appendChild(buildCard(m)));
    list.appendChild(dg);
  });
}

function buildCard(m) {
  const played = m.goles1!==null && m.goles2!==null;
  const isArg = m.es_argentina;
  const isToday = m.fecha===today;
  const t1arg = m.equipo1==='Argentina';
  const t2arg = m.equipo2==='Argentina';

  let cls = 'mc';
  if (isArg)  cls += ' arg';
  if (played) cls += ' played';

  const div = document.createElement('div');
  div.className = cls;
  div.dataset.id = m.id;

  const badges = [
    `<span class="badge badge-g">${m.fase==='grupos'?'G'+m.grupo:m.fase}</span>`,
    isArg ? '<span class="badge badge-a">⭐ ARG</span>' : '',
    played ? '<span class="badge badge-f">✅ FIN</span>' : '',
  ].join('');

  div.innerHTML = `
    <div class="mc-top">
      <span class="mc-hora ${isArg?'arg':''}">${m.hora_arg} hs · ${m.fecha.slice(5).replace('-','/')}</span>
      <div class="mc-badges">${badges}</div>
    </div>
    <div class="mc-body">
      <div class="mc-team">
        <span class="mc-name ${t1arg?'arg':''}">${m.equipo1}</span>
      </div>
      <div class="mc-scores">
        <input type="number" min="0" max="30" class="si ${m.goles1!==null?'filled':''}"
               id="g1-${m.id}" value="${m.goles1!==null?m.goles1:''}" placeholder="–"
               oninput="this.classList.toggle('filled',this.value!=='')">
        <span class="si-sep">:</span>
        <input type="number" min="0" max="30" class="si ${m.goles2!==null?'filled':''}"
               id="g2-${m.id}" value="${m.goles2!==null?m.goles2:''}" placeholder="–"
               oninput="this.classList.toggle('filled',this.value!=='')">
      </div>
      <div class="mc-team right">
        <span class="mc-name ${t2arg?'arg':''}">${m.equipo2}</span>
      </div>
    </div>
    <div style="font-size:8px;color:var(--muted);margin:5px 0 8px;">📍 ${m.sede||''}</div>
    <div class="mc-actions">
      <button class="btn-save" id="btn-${m.id}" onclick="saveMatch(${m.id})">💾 GUARDAR Y PUBLICAR</button>
      <button class="btn-del" id="del-${m.id}" onclick="delMatch(${m.id})" ${!played?'style="display:none"':''}>✕</button>
      ${isArg ? `<button onclick="sendPush('⚽ Argentina juega ahora', 'Argentina vs ${m.equipo2} · ${m.hora_arg} hs · ${m.sede||''}')" style="background:rgba(108,172,228,.12);border:1px solid rgba(108,172,228,.25);color:#9ECAF0;border-radius:7px;padding:9px 10px;font-size:13px;cursor:pointer;" title="Notificar">🔔</button>` : ''}
    </div>
  `;
  return div;
}

// ── SAVE ──
async function saveMatch(id) {
  const g1 = document.getElementById('g1-'+id).value;
  const g2 = document.getElementById('g2-'+id).value;
  if (g1==='' || g2==='') { toast('Ingresá ambos goles','err'); return; }

  const btn = document.getElementById('btn-'+id);
  btn.className='btn-save saving'; btn.textContent='⏳ GUARDANDO...'; btn.disabled=true;

  const { error } = await sb.from('mundial_partidos')
    .update({ goles1:parseInt(g1), goles2:parseInt(g2) })
    .eq('id', id);

  if (error) {
    btn.className='btn-save err'; btn.textContent='❌ ERROR';
    toast('Error: '+error.message,'err');
    setTimeout(()=>{ btn.className='btn-save'; btn.textContent='💾 GUARDAR Y PUBLICAR'; btn.disabled=false; },2500);
  } else {
    btn.className='btn-save ok'; btn.textContent='✅ PUBLICADO';
    // Actualizar local
    const idx = matches.findIndex(m=>m.id===id);
    if(idx>=0){ matches[idx].goles1=parseInt(g1); matches[idx].goles2=parseInt(g2); }
    updateStats();
    // Mostrar botón borrar
    const del = document.getElementById('del-'+id);
    if(del) del.style.display='';
    toast(`✅ ${matches.find(m=>m.id===id)?.equipo1} ${g1}:${g2} publicado en todos los celulares`);
    setTimeout(()=>{ btn.className='btn-save'; btn.textContent='💾 GUARDAR Y PUBLICAR'; btn.disabled=false; },3000);
  }
}

// ── DELETE ──
async function delMatch(id) {
  if(!confirm('¿Borrar el resultado?')) return;

  const btn = document.getElementById('btn-'+id);
  const del = document.getElementById('del-'+id);
  del.disabled=true;
  btn.className='btn-save saving'; btn.textContent='⏳ BORRANDO...'; btn.disabled=true;

  const { error } = await sb.from('mundial_partidos')
    .update({ goles1:null, goles2:null, penales1:null, penales2:null })
    .eq('id', id);

  if (error) {
    toast('Error al borrar: '+error.message,'err');
    del.disabled=false;
    btn.className='btn-save'; btn.textContent='💾 GUARDAR Y PUBLICAR'; btn.disabled=false;
  } else {
    // Actualizar local y re-renderizar la card
    const idx = matches.findIndex(m=>m.id===id);
    if(idx>=0){ matches[idx].goles1=null; matches[idx].goles2=null; }
    updateStats();
    toast('Resultado borrado');
    // Reemplazar la card con la versión sin resultado
    const card = document.querySelector(`[data-id="${id}"]`);
    if(card) {
      const newCard = buildCard(matches[idx]);
      card.replaceWith(newCard);
    }
  }
}

// ── PUSH NOTIFICATIONS ──
const OS_APP_ID = 'e5a3e4bf-4e49-44cd-a62f-afe880603224';
const OS_API_KEY = 'os_v2_app_4wr6jp2ojfcm3jrpv7uiaybsesfu5cieggte2nmkta5fowkorwwsv3l5exq5hl6abr4rsngg5gm4k6sknsi4tvo62snhbgzwtjchaoa';

async function sendPush(title, body) {
  try {
    toast('📤 Enviando notificación...');
    const res = await fetch('https://api.onesignal.com/notifications', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Key ' + OS_API_KEY,
      },
      body: JSON.stringify({
        app_id: OS_APP_ID,
        included_segments: ['All'],
        headings: { es: title, en: title },
        contents: { es: body, en: body },
        url: 'https://lps-mundial-2026.vercel.app',
        chrome_web_icon: 'https://lps-mundial-2026.vercel.app/icon-192.png',
      })
    });
    const result = await res.json();
    if (result.errors) {
      toast('Error: ' + JSON.stringify(result.errors), 'err');
    } else {
      toast('✅ Notificación enviada a ' + (result.recipients||0) + ' celulares');
    }
  } catch(e) {
    toast('Error: ' + e.message, 'err');
  }
}

checkAuth();
</script>
</body>
</html>
