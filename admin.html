<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#08111F">
<meta name="robots" content="noindex,nofollow">
<title>Admin · Mundial 2026 · LPS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --dark:#08111F;--d2:#0D1828;--d3:#122030;--d4:#1A2840;
  --mid:#1E3050;--gold:#E8C542;--gold2:#F5D96B;
  --cel:#6CACE4;--cel2:#9ECAF0;
  --text:#DDE5F3;--muted:#7A8EAD;--white:#FFF;
  --green:#2ECC71;--red:#E74C3C;--orange:#F39C12;
  --admin:#E84848;--admin2:rgba(232,72,72,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Barlow Condensed',sans-serif;}
input,button,select{font-family:'Barlow Condensed',sans-serif;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--d2);} ::-webkit-scrollbar-thumb{background:var(--mid);}

/* ══ LOGIN SCREEN ══ */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#050C18,#0A1525);}
.login-card{background:var(--d3);border:1.5px solid rgba(232,72,72,.3);border-radius:16px;padding:30px 24px;width:100%;max-width:360px;text-align:center;}
.login-icon{font-size:44px;margin-bottom:12px;}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);letter-spacing:2px;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:24px;}
.form-group{margin-bottom:14px;text-align:left;}
.form-label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:5px;}
.form-input{width:100%;background:rgba(0,0,0,.3);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 14px;color:var(--white);font-size:14px;font-weight:600;transition:border-color .2s;outline:none;}
.form-input:focus{border-color:var(--admin);}
.btn-login{width:100%;background:var(--admin);color:#fff;border:none;border-radius:8px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:opacity .2s;margin-top:8px;}
.btn-login:hover{opacity:.9;}
.btn-login:disabled{opacity:.5;cursor:default;}
.login-error{background:rgba(232,72,72,.15);border:1px solid rgba(232,72,72,.3);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--admin);margin-top:10px;display:none;}
.login-lps{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;}
.lps-logo-small{background:#FFD000;border-radius:3px;padding:1px 6px;}
.lps-logo-txt{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#000;line-height:1;}
.lps-logo-txt .pw{color:#fff;}

/* ══ MAIN ADMIN SCREEN ══ */
.admin-screen{display:none;flex-direction:column;height:100vh;}

/* Header */
.adm-hdr{background:linear-gradient(135deg,#160808,#200E0E);border-bottom:2px solid var(--admin);padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.adm-hdr-left{display:flex;align-items:center;gap:10px;}
.adm-badge{background:var(--admin);color:#fff;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;}
.adm-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white);letter-spacing:1px;}
.adm-title span{color:var(--admin);}
.adm-user{font-size:9px;color:var(--muted);letter-spacing:.5px;}
.btn-logout{background:rgba(232,72,72,.15);border:1px solid rgba(232,72,72,.3);color:var(--admin);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;}

/* Filter bar */
.filter-bar{background:var(--d2);border-bottom:1px solid rgba(255,255,255,.05);padding:8px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;}
.filter-bar::-webkit-scrollbar{height:0;}
.filter-btn{flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;white-space:nowrap;transition:all .2s;}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:#000;}

/* Stats bar */
.stats-bar{background:var(--d3);border-bottom:1px solid rgba(255,255,255,.05);padding:8px 14px;display:flex;gap:14px;flex-shrink:0;}
.stat-item{text-align:center;}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);display:block;line-height:1;}
.stat-l{font-size:7px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;display:block;}
.stat-item.green .stat-n{color:var(--green);}
.stat-item.red .stat-n{color:var(--admin);}
.live-indicator{display:flex;align-items:center;gap:5px;margin-left:auto;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--green);}

/* Match list */
.match-list{flex:1;overflow-y:auto;padding:10px 12px;}
.date-group{margin-bottom:14px;}
.date-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.date-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(232,197,66,.25),transparent);}
.match-card{background:var(--d3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;margin-bottom:6px;transition:border-color .2s;position:relative;overflow:hidden;}
.match-card.arg{border-color:rgba(108,172,228,.25);background:linear-gradient(135deg,#0C1E35,#12273F);}
.match-card.played{border-color:rgba(46,204,113,.2);}
.match-card.today{border-color:rgba(243,156,18,.3);background:linear-gradient(135deg,#1A1600,#251E00);}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.match-card.arg::before{background:linear-gradient(90deg,var(--cel),transparent);}
.match-card.played::before{background:linear-gradient(90deg,var(--green),transparent);}
.match-card.today::before{background:linear-gradient(90deg,var(--orange),transparent);}

/* Match card content */
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.mc-hora{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.mc-hora.arg{color:var(--cel2);}
.mc-hora.today{color:var(--orange);}
.mc-badges{display:flex;gap:4px;align-items:center;}
.mc-badge{font-size:7px;font-weight:700;letter-spacing:.8px;padding:2px 5px;border-radius:3px;}
.mc-badge.grupo{background:rgba(255,255,255,.07);color:var(--muted);}
.mc-badge.arg{background:rgba(108,172,228,.15);color:var(--cel);}
.mc-badge.today{background:rgba(243,156,18,.15);color:var(--orange);}
.mc-badge.played{background:rgba(46,204,113,.15);color:var(--green);}
.mc-sede{font-size:8px;color:var(--muted);}

/* Score editor — inline */
.mc-body{display:flex;align-items:center;gap:8px;}
.mc-team{flex:1;}
.mc-team-name{font-size:13px;font-weight:800;color:var(--text);display:block;line-height:1.2;}
.mc-team-name.arg{color:var(--cel2);}
.mc-team-flag{font-size:16px;display:block;line-height:1;margin-bottom:2px;}
.mc-score-area{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.score-input{width:38px;height:38px;background:rgba(0,0,0,.35);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:22px;text-align:center;outline:none;transition:border-color .2s;}
.score-input:focus{border-color:var(--gold);}
.score-input.set{background:rgba(232,197,66,.08);border-color:rgba(232,197,66,.4);}
.score-sep{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);}
.mc-team.right{text-align:right;}

/* Save button */
.mc-actions{display:flex;gap:6px;margin-top:8px;}
.btn-save{flex:1;background:var(--gold);color:#000;border:none;border-radius:7px;padding:9px 14px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-save:hover{background:var(--gold2);}
.btn-save:disabled{opacity:.5;cursor:default;}
.btn-save.saving{background:var(--orange);}
.btn-save.saved{background:var(--green);color:#fff;}
.btn-save.error{background:var(--red);color:#fff;}
.btn-notif{background:rgba(108,172,228,.12);border:1px solid rgba(108,172,228,.25);color:var(--cel);border-radius:7px;padding:9px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;white-space:nowrap;}
.btn-clear{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);color:var(--admin);border-radius:7px;padding:9px 10px;font-size:11px;font-weight:700;cursor:pointer;}

/* Penales row */
.pen-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05);}
.pen-label{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1px;flex-shrink:0;}
.pen-input{width:30px;height:28px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:5px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:center;outline:none;}
.pen-input.set{border-color:rgba(108,172,228,.4);}
.pen-toggle{font-size:8px;font-weight:700;color:var(--cel);cursor:pointer;letter-spacing:.5px;background:none;border:none;margin-left:auto;}

/* Toast notification */
.toast{position:fixed;top:70px;left:12px;right:12px;background:var(--d4);border-radius:10px;padding:12px 14px;font-size:12px;font-weight:600;color:var(--text);z-index:9999;transform:translateY(-80px);opacity:0;transition:all .3s;border-left:3px solid var(--green);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{border-left-color:var(--red);}
.toast.info{border-left-color:var(--cel);}

/* Notif modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;}
.modal-overlay.show{display:flex;}
.modal{background:var(--d2);border-radius:16px 16px 0 0;border-top:2px solid var(--cel);padding:20px;width:100%;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--cel);margin-bottom:14px;}
.notif-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.notif-opt{background:var(--d3);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px;cursor:pointer;transition:border-color .2s;}
.notif-opt.sel{border-color:var(--cel);background:var(--cel3);}
.notif-opt-title{font-size:11px;font-weight:800;color:var(--text);display:block;margin-bottom:2px;}
.notif-opt-sub{font-size:9px;color:var(--muted);display:block;}
.notif-preview{background:rgba(0,0,0,.2);border-radius:8px;padding:10px;font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:12px;min-height:50px;}
.notif-preview strong{color:var(--text);}
.modal-actions{display:flex;gap:8px;}
.btn-modal{flex:1;border-radius:8px;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;border:none;}
.btn-modal.primary{background:var(--cel);color:#000;}
.btn-modal.secondary{background:rgba(255,255,255,.07);color:var(--muted);}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-txt{font-size:12px;color:var(--muted);}

/* Loading spinner */
.spinner{width:24px;height:24px;border:2px solid rgba(232,197,66,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div class="login-screen" id="login-screen">
  <div class="login-card">

<!-- ══════════════ ADMIN SCREEN ══════════════ -->
<div class="admin-screen" id="admin-screen">

  <!-- Header -->
  <div class="adm-hdr">
    <div class="adm-hdr-left">
      <span class="adm-badge">ADMIN</span>
      <div>
        <div class="adm-title">MUNDIAL <span>2026</span></div>

    <div class="stat-item red">
      <span class="stat-n" id="stat-restantes">0</span>

      <span class="stat-n" id="stat-hoy">0</span>

</div><!-- /admin-screen -->

<!-- ══════════════ NOTIF MODAL ══════════════ -->
<div class="modal-overlay" id="notif-modal" onclick="closeNotifModal(event)">
  <div class="modal">
    <div class="modal-title">🔔 Enviar Notificación</div>
    <div id="modal-match-info" style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5;"></div>
    <div class="notif-options">
      <div class="notif-opt sel" onclick="selectNotifOpt(this,'30min')">
        <span class="notif-opt-title">⏰ 30 minutos</span>

      </div>

      </div>
      <div class="notif-opt" onclick="selectNotifOpt(this,'ahora')">
        <span class="notif-opt-title">📢 Ahora</span>
        <span class="notif-opt-sub">Enviar ya</span>
      </div>
      <div class="notif-opt" onclick="selectNotifOpt(this,'resultado')">
        <span class="notif-opt-title">✅ Resultado</span>
        <span class="notif-opt-sub">Partido finalizado</span>
      </div>
    </div>
    <div style="font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;">Vista previa</div>
    <div class="notif-preview" id="notif-preview"></div>
    <div class="modal-actions">
      <button class="btn-modal secondary" onclick="closeNotifModal()">Cancelar</button>
      <button class="btn-modal primary" onclick="sendNotification()">📤 Enviar por WhatsApp</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════════
// CONFIG — reemplazá con tus datos de Supabase
// ══════════════════════════════════════════════
const SB_URL = 'https://gesujigrxpqvyuquitmz.supabase.co';
const SB_KEY = 'sb_publishable_jEvLMS6TZnRFgyAtEaY7JQ_Va8XpgYk'; // ← tu anon key

const sb = window.supabase.createClient(SB_URL, SB_KEY);

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
let allMatches = [];
let currentFilter = 'hoy';
let currentMatchForNotif = null;
let currentNotifType = '30min';
let todayStr = '';

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function getToday() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

function formatDate(fecha) {
  if (!fecha) return '';
  const [y,m,d] = fecha.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const dt = new Date(Number(y), Number(m)-1, Number(d));
  return `${days[dt.getDay()]} ${Number(d)} de ${months[dt.getMonth()]}`;
}

function faseLabel(f) {
  const m = {grupos:'Fase de Grupos','16avos':'16avos de Final',octavos:'Octavos',cuartos:'Cuartos',semifinal:'Semifinal','3erpuesto':'Tercer Puesto',final:'GRAN FINAL'};
  return m[f] || f;
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showAdmin(session.user.email);
  }
  // Listen for auth changes
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN') showAdmin(session.user.email);
    if (event === 'SIGNED_OUT') showLogin();
  });
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');

  if (!email || !pass) { err.style.display='block'; err.textContent='⚠️ Completá email y contraseña'; return; }

  btn.disabled = true;
  btn.textContent = 'INGRESANDO...';
  err.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    err.textContent = '❌ ' + (error.message === 'Invalid login credentials' ? 'Email o contraseña incorrectos' : error.message);
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'INGRESAR';
  }
  // showAdmin called by onAuthStateChange
}

async function doLogout() {
  await sb.auth.signOut();
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'INGRESAR';
}

function showAdmin(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'flex';
  document.getElementById('adm-user-email').textContent = email || '';
  todayStr = getToday();
  loadMatches();
  subscribeRealtime();
}

// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
async function loadMatches() {
  document.getElementById('match-list').innerHTML = '<div class="spinner"></div>';
  const { data, error } = await sb.from('mundial_partidos').select('*').order('id');
  if (error) { showToast('Error cargando partidos: ' + error.message, 'error'); return; }
  allMatches = data || [];
  updateStats();
  renderList();
}

function subscribeRealtime() {
  sb.channel('admin_live')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'mundial_partidos' }, payload => {
      const idx = allMatches.findIndex(m => m.id === payload.new.id);
      if (idx >= 0) allMatches[idx] = payload.new;
      updateStats();
      // Update individual card if visible without full re-render
      const card = document.querySelector(`[data-id="${payload.new.id}"]`);
      if (card) updateCardUI(card, payload.new);
      document.getElementById('live-indicator').style.display = 'flex';
      setTimeout(() => { document.getElementById('live-indicator').style.display = 'none'; }, 2000);
    })
    .subscribe();
}

// ══════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════
function updateStats() {
  const jugados = allMatches.filter(m => m.goles1 !== null && m.goles2 !== null).length;
  const hoy = allMatches.filter(m => m.fecha === todayStr).length;
  document.getElementById('stat-jugados').textContent = jugados;
  document.getElementById('stat-restantes').textContent = allMatches.length - jugados;
  document.getElementById('stat-hoy').textContent = hoy;
}

// ══════════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════════
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function getFiltered() {
  switch (currentFilter) {
    case 'hoy':       return allMatches.filter(m => m.fecha === todayStr);
    case 'arg':       return allMatches.filter(m => m.es_argentina);
    case 'pendiente': return allMatches.filter(m => m.goles1 === null || m.goles2 === null);
    case 'todos':     return allMatches;
    default:          return allMatches.filter(m => m.fase === currentFilter);
  }
}

// ══════════════════════════════════════════════
// RENDER LIST
// ══════════════════════════════════════════════
function renderList() {
  const list = document.getElementById('match-list');
  const filtered = getFiltered();

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-txt">No hay partidos en este filtro</div></div>`;
    return;
  }

  // Group by date
  const byDate = {};
  filtered.forEach(m => {
    if (!byDate[m.fecha]) byDate[m.fecha] = [];
    byDate[m.fecha].push(m);
  });

  list.innerHTML = '';

  Object.keys(byDate).sort().forEach(fecha => {
    const group = document.createElement('div');
    group.className = 'date-group';

    const isToday = fecha === todayStr;
    group.innerHTML = `<div class="date-label">${isToday ? '⚡ HOY · ' : ''}${formatDate(fecha)}</div>`;

    byDate[fecha].forEach(m => {
      group.appendChild(buildCard(m));
    });

    list.appendChild(group);
  });
}

// ══════════════════════════════════════════════
// BUILD MATCH CARD
// ══════════════════════════════════════════════
function buildCard(m) {
  const played  = m.goles1 !== null && m.goles2 !== null;
  const isToday = m.fecha === todayStr;
  const isArg   = m.es_argentina;

  let cardClass = 'match-card';
  if (isArg)   cardClass += ' arg';
  if (played)  cardClass += ' played';
  if (isToday) cardClass += ' today';

  const div = document.createElement('div');
  div.className = cardClass;
  div.dataset.id = m.id;

  // Badges
  let badges = `<span class="mc-badge grupo">${faseLabel(m.fase)}${m.grupo?' · G'+m.grupo:''}</span>`;
  if (isArg)   badges += `<span class="mc-badge arg">⭐ ARG</span>`;
  if (isToday) badges += `<span class="mc-badge today">HOY</span>`;
  if (played)  badges += `<span class="mc-badge played">✅ FIN</span>`;

  const horaClass = isArg ? 'mc-hora arg' : (isToday ? 'mc-hora today' : 'mc-hora');
  const t1arg = m.equipo1 === 'Argentina';
  const t2arg = m.equipo2 === 'Argentina';

  // Penales (show if one score > other in 90min but game has extra context)
  const hasPen = m.penales1 !== null || m.penales2 !== null;

  div.innerHTML = `
    <div class="mc-top">
      <span class="${horaClass}">${m.hora_arg} hs ${m.fecha !== todayStr ? '· '+m.fecha.slice(5).replace('-','/') : ''}</span>
      <div class="mc-badges">${badges}</div>
    </div>
    <div class="mc-body">
      <div class="mc-team">
        <span class="mc-team-flag">${m.flag1 && m.flag1 !== '⭐' ? m.flag1 : (isArg&&t1arg?'⭐':'')}</span>
        <span class="mc-team-name ${t1arg?'arg':''}">${m.equipo1}</span>
      </div>
      <div class="mc-score-area">
        <input type="number" min="0" max="30" class="score-input ${m.goles1!==null?'set':''}" 
               data-field="goles1" data-id="${m.id}"
               value="${m.goles1!==null?m.goles1:''}" placeholder="–" 
               oninput="onScoreInput(this,${m.id})">
        <span class="score-sep">:</span>
        <input type="number" min="0" max="30" class="score-input ${m.goles2!==null?'set':''}" 
               data-field="goles2" data-id="${m.id}"
               value="${m.goles2!==null?m.goles2:''}" placeholder="–"
               oninput="onScoreInput(this,${m.id})">
      </div>
      <div class="mc-team right">
        <span class="mc-team-flag">${m.flag2 && m.flag2 !== '⭐' ? m.flag2 : (isArg&&t2arg?'⭐':'')}</span>
        <span class="mc-team-name ${t2arg?'arg':''}">${m.equipo2}</span>
      </div>
    </div>
    ${hasPen ? `
    <div class="pen-row">
      <span class="pen-label">PENALES:</span>
      <input type="number" min="0" max="20" class="pen-input ${m.penales1!==null?'set':''}" 
             data-field="penales1" data-id="${m.id}"
             value="${m.penales1!==null?m.penales1:''}" placeholder="–"
             oninput="onScoreInput(this,${m.id})">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted)">:</span>
      <input type="number" min="0" max="20" class="pen-input ${m.penales2!==null?'set':''}" 
             data-field="penales2" data-id="${m.id}"
             value="${m.penales2!==null?m.penales2:''}" placeholder="–"
             oninput="onScoreInput(this,${m.id})">
    </div>` : ''}
    <div class="mc-actions">
      <button class="btn-save" id="save-${m.id}" onclick="saveMatch(${m.id})">
        💾 GUARDAR Y PUBLICAR
      </button>
      ${isArg ? `<button class="btn-notif" onclick="openNotifModal(${m.id})">🔔</button>` : ''}
      ${played ? `<button class="btn-clear" onclick="clearMatch(${m.id})" title="Borrar resultado">✕</button>` : ''}
    </div>
    <div style="display:flex;align-items:center;gap:4px;margin-top:4px;">
      ${hasPen ? '' : `<button onclick="togglePenales(${m.id},this)" style="background:none;border:none;color:var(--cel);font-size:9px;font-weight:700;letter-spacing:.5px;cursor:pointer;padding:0;">+ PENALES / PRORROGA</button>`}
      <span style="margin-left:auto;font-size:8px;color:var(--muted);">📍 ${m.sede||''}</span>
    </div>
  `;

  return div;
}

function updateCardUI(card, m) {
  // Update score inputs
  const i1 = card.querySelector('[data-field="goles1"]');
  const i2 = card.querySelector('[data-field="goles2"]');
  if (i1) { i1.value = m.goles1!==null?m.goles1:''; i1.className = 'score-input' + (m.goles1!==null?' set':''); }
  if (i2) { i2.value = m.goles2!==null?m.goles2:''; i2.className = 'score-input' + (m.goles2!==null?' set':''); }
}

// ══════════════════════════════════════════════
// SAVE MATCH
// ══════════════════════════════════════════════
function onScoreInput(input, id) {
  input.classList.toggle('set', input.value !== '');
}

async function saveMatch(id) {
  const match = allMatches.find(m => m.id === id);
  if (!match) return;

  const card = document.querySelector(`[data-id="${id}"]`);
  const i1 = card.querySelector('[data-field="goles1"]');
  const i2 = card.querySelector('[data-field="goles2"]');
  const p1 = card.querySelector('[data-field="penales1"]');
  const p2 = card.querySelector('[data-field="penales2"]');

  const g1 = i1 && i1.value !== '' ? parseInt(i1.value) : null;
  const g2 = i2 && i2.value !== '' ? parseInt(i2.value) : null;
  const pen1 = p1 && p1.value !== '' ? parseInt(p1.value) : null;
  const pen2 = p2 && p2.value !== '' ? parseInt(p2.value) : null;

  if (g1 === null && g2 === null) {
    showToast('⚠️ Ingresá al menos un resultado', 'error'); return;
  }

  const btn = document.getElementById(`save-${id}`);
  btn.className = 'btn-save saving';
  btn.textContent = '⏳ GUARDANDO...';
  btn.disabled = true;

  const updates = { goles1:g1, goles2:g2 };
  if (pen1 !== null) updates.penales1 = pen1;
  if (pen2 !== null) updates.penales2 = pen2;

  const { error } = await sb.from('mundial_partidos').update(updates).eq('id', id);

  if (error) {
    btn.className = 'btn-save error';
    btn.textContent = '❌ ERROR';
    showToast('Error: ' + error.message, 'error');
    setTimeout(() => { btn.className='btn-save'; btn.textContent='💾 GUARDAR Y PUBLICAR'; btn.disabled=false; }, 2000);
  } else {
    btn.className = 'btn-save saved';
    btn.textContent = '✅ PUBLICADO EN TIEMPO REAL';
    showToast(`✅ ${match.equipo1} ${g1} : ${g2} ${match.equipo2} — publicado en todos los celulares`);
    setTimeout(() => { btn.className='btn-save'; btn.textContent='💾 GUARDAR Y PUBLICAR'; btn.disabled=false; }, 3000);
  }
}

async function clearMatch(id) {
  if (!confirm('¿Borrar el resultado de este partido?')) return;

  // Guardar estado anterior por si hay que revertir
  const idx = allMatches.findIndex(m => m.id === id);
  const prev = idx >= 0 ? Object.assign({}, allMatches[idx]) : null;

  // Actualizar local inmediatamente
  if (idx >= 0) {
    allMatches[idx].goles1 = null;
    allMatches[idx].goles2 = null;
    allMatches[idx].penales1 = null;
    allMatches[idx].penales2 = null;
  }
  updateStats();
  renderList();

  // Guardar en Supabase
  const { error } = await sb
    .from('mundial_partidos')
    .update({ goles1: null, goles2: null, penales1: null, penales2: null })
    .eq('id', id);

  if (error) {
    // Revertir si fallo
    if (idx >= 0 && prev) allMatches[idx] = prev;
    updateStats();
    renderList();
    showToast('Error al borrar: ' + error.message, 'error');
  } else {
    showToast('Resultado borrado');
    // Recargar todo desde Supabase para garantizar consistencia
    setTimeout(() => loadMatches(), 800);
  }
}

function togglePenales(id, btn) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const existingRow = card.querySelector('.pen-row');
  if (existingRow) { existingRow.remove(); btn.textContent = '+ PENALES / PRORROGA'; return; }
  
  const penRow = document.createElement('div');
  penRow.className = 'pen-row';
  penRow.innerHTML = `
    <span class="pen-label">PENALES:</span>
    <input type="number" min="0" max="20" class="pen-input" data-field="penales1" data-id="${id}" placeholder="–" oninput="onScoreInput(this,${id})">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted)">:</span>
    <input type="number" min="0" max="20" class="pen-input" data-field="penales2" data-id="${id}" placeholder="–" oninput="onScoreInput(this,${id})">
  `;
  
  const actionsRow = card.querySelector('.mc-actions');
  actionsRow.parentNode.insertBefore(penRow, actionsRow);
  btn.textContent = '– Quitar penales';
}

// ══════════════════════════════════════════════
// NOTIF MODAL
// ══════════════════════════════════════════════
function openNotifModal(id) {
  currentMatchForNotif = allMatches.find(m => m.id === id);
  if (!currentMatchForNotif) return;
  const m = currentMatchForNotif;
  document.getElementById('modal-match-info').innerHTML =
    `<strong>${m.equipo1}</strong> vs <strong>${m.equipo2}</strong><br>${formatDate(m.fecha)} · ${m.hora_arg} hs · ${m.sede||''}`;
  currentNotifType = '30min';
  document.querySelectorAll('.notif-opt').forEach((o,i) => o.classList.toggle('sel', i===0));
  updateNotifPreview();
  document.getElementById('notif-modal').classList.add('show');
}

function closeNotifModal(e) {
  if (!e || e.target === document.getElementById('notif-modal')) {
    document.getElementById('notif-modal').classList.remove('show');
  }
}

function selectNotifOpt(el, type) {
  currentNotifType = type;
  document.querySelectorAll('.notif-opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  updateNotifPreview();
}

function updateNotifPreview() {
  const m = currentMatchForNotif;
  if (!m) return;
  const rival = m.equipo1==='Argentina' ? m.equipo2 : m.equipo1;
  const g1 = m.goles1, g2 = m.goles2;
  const played = g1!==null && g2!==null;
  let txt = '';
  
  switch (currentNotifType) {
    case '30min':
      txt = `⚽ ¡En 30 minutos juega Argentina!\n🆚 ${rival}\n📍 ${m.sede||''} · ${m.hora_arg} hs\n\n🔴 VER RESULTADOS EN VIVO\nmundial.lpsseguridad.com.ar`;
      break;
    case '1h':
      txt = `⚽ ¡En 1 hora juega Argentina!\n🆚 ${rival}\n📍 ${m.sede||''} · ${m.hora_arg} hs\n\n🔴 VER RESULTADOS EN VIVO\nmundial.lpsseguridad.com.ar`;
      break;
    case 'ahora':
      txt = `⭐ ¡ARRANCA ARGENTINA!\n🆚 ${rival}\n📍 ${m.sede||''}\n\n🔴 Seguí el marcador en vivo\nmundial.lpsseguridad.com.ar`;
      break;
    case 'resultado':
      if (played) {
        const golesArg = m.equipo1==='Argentina'?g1:g2;
        const golesRival = m.equipo1==='Argentina'?g2:g1;
        const gano = golesArg > golesRival;
        txt = `${gano?'🏆':'⚽'} RESULTADO: Argentina ${golesArg} - ${golesRival} ${rival}\n${gano?'✅ ¡ARGENTINA GANÓ!':'➡️ Resultado final'}\n\nmundial.lpsseguridad.com.ar`;
      } else {
        txt = `✅ RESULTADO: Argentina vs ${rival}\n[resultado pendiente]\n\nmundial.lpsseguridad.com.ar`;
      }
      break;
  }
  document.getElementById('notif-preview').innerHTML = txt.replace(/\n/g,'<br>');
}

function sendNotification() {
  const m = currentMatchForNotif;
  if (!m) return;
  const rival = m.equipo1==='Argentina' ? m.equipo2 : m.equipo1;
  
  // Por ahora: enviar por WhatsApp (Parte 3 tendrá push nativo)
  const txt = document.getElementById('notif-preview').innerText;
  const waUrl = `https://wa.me/?text=${encodeURIComponent(txt)}`;
  window.open(waUrl, '_blank');
  closeNotifModal();
  showToast('📤 Mensaje listo para compartir por WhatsApp', 'info');
}
